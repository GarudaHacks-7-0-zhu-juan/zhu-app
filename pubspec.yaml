name: zhu_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  dio: ^5.9.1
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.0.0
  freezed_annotation: ^3.1.0
  geolocator: ^14.0.3
  go_router: ^17.1.0
  json_annotation: ^4.11.0
  permission_handler: ^12.0.3
  riverpod_annotation: ^4.0.1
  shadcn_ui: ^0.55.0
  yaml: ^3.1.3

dev_dependencies:
  build_runner: ^2.12.0
  freezed: ^3.2.5
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/config/
    - assets/fonts/
  fonts:
    - family: IBMPlexSans
      fonts:
        - asset: assets/fonts/IBMPlexSans.ttf
    - family: IBMPlexMono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500
